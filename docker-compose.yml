# DVAIA: Docker setup with Ollama local models + Qdrant vector store
# Run: docker compose up --build
# The ollama service will auto-pull llama3.2 on first startup
services:
  ollama:
    networks:
      - dvaia
    image: ollama/ollama:latest
    container_name: dvaia-ollama
    dns:
      - 8.8.8.8      # Google DNS (fixes registry.ollama.ai resolution)
      - 1.1.1.1      # Cloudflare DNS
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11480:11434"
    restart: "no" # unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start Ollama in the background
        /bin/ollama serve &
        # Wait for Ollama to be ready
        sleep 5
        # Pull llama3.2 if not already present
        ollama pull llama3.2
        # Pull nomic-embed-text if not already present
        ollama pull nomic-embed-text
        # Pull qwen3:0.6b for Agentic panel (thinking/CoT)
        ollama pull qwen3:0.6b
        # Pull qwen2.5vl:7b for Document Injection vision mode
        ollama pull qwen2.5vl:7b
        # Or pull manually
        # docker compose exec ollama ollama pull llama3.2
        # docker compose exec ollama ollama pull nomic-embed-text
        # docker compose exec ollama ollama pull qwen3:0.6b
        # docker compose exec ollama ollama pull qwen2.5vl:7b
        
        # Keep container running
        wait

  qdrant:
    image: qdrant/qdrant:latest
    container_name: dvaia-qdrant
    networks:
      - dvaia
    ports:
      - "6333:6333"
    # No persistent volume: each docker compose up starts with empty vector store.
    restart: "no" #unless-stopped

  dvaia:
    build: .
    container_name: dvaia-app
    networks:
      - dvaia
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PORT=${PORT:-5000}
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DEFAULT_MODEL=${DEFAULT_MODEL:-ollama:llama3.2}
      - VISION_MODEL=${VISION_MODEL:-ollama:qwen2.5vl:7b}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      # All data stored in /tmp (cleared when container stops)
      - DATABASE_URI=/tmp/app.db
      - UPLOAD_DIR=/tmp/uploads
      - PAYLOADS_OUTPUT_DIR=/tmp/payloads/generate
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      - ollama
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no" #unless-stopped

networks:
  dvaia:
    driver: bridge

volumes:
  ollama_data:
